metadata:
  format: "Lava-Test Test Definition 1.0"
  name: bt-precheck
  description: Bluetooth prechecks – wait for all adapters before BT tests
  os:
    - linux
  scope:
    - functional

run:
  steps:
    - lava-test-case bt-hci-check --shell |
        echo "Waiting for Bluetooth adapters to initialize..."

        i=0
        while [ $i -lt 15 ]; do
          hciconfig | grep -q "^hci1" && echo "USB Bluetooth (hci1) detected" && break
          sleep 2
          i=$((i+1))
        done

        echo "Final hciconfig output:"
        hciconfig || true

        exit 0