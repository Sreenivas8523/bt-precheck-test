metadata:
  format: "Lava-Test Test Definition 1.0"
  name: gst-codec-precheck
  description: GStreamer H264/H265 encoder/decoder availability precheck
  os:
    - linux
  scope:
    - functional

run:
  steps:
    - lava-test-case gst-codec-precheck --shell "echo 'Checking GStreamer H264/H265 encoders and decoders'; gst-inspect-1.0 | grep -E 'avdec_h26(4|5)|x26(4|5)enc|v4l2h26(4|5)(enc|dec)' && echo 'H264/H265 video enc/dec available' || echo 'No H264/H265 video encoders or decoders found'; gst-inspect-1.0 | grep -E 'avdec_h26(4|5)|x26(4|5)enc|v4l2h26(4|5)(enc|dec)' || true"