metadata:
  format: "Lava-Test Test Definition 1.0"
  name: gst-codec-precheck
  description: GStreamer H264/H265 codec availability precheck
  os:
    - linux
  scope:
    - functional

run:
  steps:
    - lava-test-case gst-codec-precheck --shell "echo 'Checking GStreamer codec plugins'; gst-inspect-1.0 | grep -E '264|265|v4l2|x264|avdec' && echo 'Codec plugins found' || echo 'No H264/H265 codec plugins found'; gst-inspect-1.0 | grep -E '264|265|v4l2|x264|avdec' || true"